name: Security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "20 5 * * 2"

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development, unknown

  python-security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,security]"

      - name: Freeze auditable Python packages
        run: python -m pip list --format=freeze --exclude-editable > audit-requirements.txt

      - name: Audit installed Python packages
        run: python -m pip_audit -r audit-requirements.txt --strict --no-deps --progress-spinner off

      - name: Run Bandit static security scan
        run: python -m bandit -c pyproject.toml -r src scripts
